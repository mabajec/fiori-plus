{# A single transaction row.
   When oob=True, wrap in <template> so the OOB swap survives parsing in a
   non-tbody context (the edit modal response is targeted at #modal-container,
   a <div>, so a bare <tr> would be stripped by the browser HTML parser). #}
{% if oob %}<template>{% endif %}
<tr id="txn-row-{{ tr.id }}"{% if oob %} hx-swap-oob="outerHTML"{% endif %}
    class="border-b border-slate-100 dark:border-slate-700 last:border-b-0 hover:bg-slate-50 dark:hover:bg-slate-900/30">
  <td class="px-3 py-2 whitespace-nowrap text-slate-600 dark:text-slate-300 tabular-nums">{{ tr.posting_date.strftime('%Y-%m-%d') }}</td>
  <td class="px-3 py-2">
    <div class="font-medium">{{ proj.name }}</div>
    <div class="text-xs text-slate-400 dark:text-slate-500">{{ proj.pps_element }}</div>
  </td>
  <td class="px-3 py-2 text-slate-600 dark:text-slate-300 tabular-nums whitespace-nowrap">{{ tr.document_number }}</td>
  <td class="px-3 py-2">
    <div class="tabular-nums">{{ tr.account_code }}</div>
    <div class="text-xs text-slate-400 dark:text-slate-500">{{ tr.account_text or '' }}</div>
  </td>
  <td class="px-3 py-2 text-right tabular-nums font-medium {% if tr.amount < 0 %}text-red-600 dark:text-red-400{% endif %}">{{ tr.amount_formatted }}</td>
  <td class="px-3 py-2 text-slate-600 dark:text-slate-300 tabular-nums whitespace-nowrap">{{ tr.employee or '' }}</td>
  <td class="px-3 py-2 text-slate-600 dark:text-slate-300">{{ tr.text or '' }}</td>
  <td class="px-3 py-2 text-slate-500 dark:text-slate-400 text-xs whitespace-nowrap">{{ tr.source or '' }}</td>
  <td class="px-3 py-2 text-right">
    <button hx-get="/transactions/{{ tr.id }}/edit"
            hx-target="#modal-container"
            hx-swap="innerHTML"
            class="p-1 rounded hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400"
            title="Edit">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
      </svg>
    </button>
  </td>
</tr>
{% if oob %}</template>{% endif %}
