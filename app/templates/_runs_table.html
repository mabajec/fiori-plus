{# Recent imports block. Sent OOB after each successful import.
   Wrapped in <template> when oob=True so the parser context of the
   triggering swap doesn't fragment the section. #}
{% if oob %}<template>{% endif %}
<section id="recent-imports"{% if oob %} hx-swap-oob="true"{% endif %}>
  <h2 class="text-lg font-semibold mb-3">Recent imports</h2>
  {% if not runs %}
    <p class="text-sm text-slate-500 dark:text-slate-400">No imports yet.</p>
  {% else %}
    <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-700">
          <tr class="text-left text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400">
            <th class="px-4 py-2 font-medium">When</th>
            <th class="px-4 py-2 font-medium">File</th>
            <th class="px-4 py-2 font-medium">Project</th>
            <th class="px-4 py-2 font-medium">Mode</th>
            <th class="px-4 py-2 font-medium text-right">Inserted</th>
            <th class="px-4 py-2 font-medium text-right">Skipped</th>
            <th class="px-4 py-2 font-medium text-right">Deleted</th>
          </tr>
        </thead>
        <tbody>
          {% for r in runs %}
            <tr class="border-b border-slate-100 dark:border-slate-700 last:border-b-0">
              <td class="px-4 py-2 text-slate-600 dark:text-slate-300">{{ r.imported_at.strftime('%Y-%m-%d %H:%M') }}</td>
              <td class="px-4 py-2">{{ r.filename }}</td>
              <td class="px-4 py-2">
                {{ r.project_name }}
                <span class="text-slate-400 dark:text-slate-500 text-xs">({{ r.pps_element }})</span>
              </td>
              <td class="px-4 py-2">
                {% if r.mode == 'replace' %}
                  <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-300 text-xs font-medium">replace</span>
                {% else %}
                  <span class="text-slate-500 dark:text-slate-400 text-xs">add</span>
                {% endif %}
              </td>
              <td class="px-4 py-2 text-right tabular-nums">{{ r.rows_imported }}</td>
              <td class="px-4 py-2 text-right tabular-nums text-slate-400 dark:text-slate-500">{{ r.rows_skipped }}</td>
              <td class="px-4 py-2 text-right tabular-nums {% if r.rows_deleted %}text-amber-600 dark:text-amber-400{% else %}text-slate-400 dark:text-slate-500{% endif %}">{{ r.rows_deleted }}</td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  {% endif %}
</section>
{% if oob %}</template>{% endif %}
