<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Fiori Plus — Sign in{% endblock %}</title>
  <link rel="icon" type="image/png" href="/static/favicons/favicon-96x96.png" sizes="96x96">
  <link rel="icon" type="image/svg+xml" href="/static/favicons/favicon.svg">
  <link rel="shortcut icon" href="/static/favicons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/favicons/apple-touch-icon.png">
  <link rel="manifest" href="/static/favicons/site.webmanifest">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' };
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 antialiased min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="flex items-center gap-2 justify-center mb-6">
      <img src="/static/favicons/favicon.svg" alt="" class="w-10 h-10 rounded-lg">
      <span class="font-semibold text-xl">Fiori Plus</span>
    </div>
    <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-sm p-6">
      {% block content %}{% endblock %}
    </div>
    {% block below %}{% endblock %}
  </div>
</body>
</html>
