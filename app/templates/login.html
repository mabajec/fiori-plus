{% extends "_auth_base.html" %}
{% block title %}Sign in — Fiori Plus{% endblock %}
{% block content %}
<h1 class="text-lg font-semibold mb-1">Sign in to Fiori Plus</h1>
<p class="text-sm text-slate-500 dark:text-slate-400 mb-5">Enter your email and password.</p>

{% if error %}
  <div class="mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300">
    {{ error }}
  </div>
{% endif %}

<form method="post" action="/login" class="space-y-4">
  <div>
    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Email</label>
    <input type="email" name="email" required autofocus value="{{ email or '' }}"
           class="w-full px-3 py-2 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
  </div>
  <div>
    <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Password</label>
    <input type="password" name="password" required
           class="w-full px-3 py-2 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
  </div>
  <button type="submit"
          class="w-full px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
    Continue
  </button>
</form>
{% endblock %}
