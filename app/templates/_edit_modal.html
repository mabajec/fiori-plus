{# Edit modal for a single transaction.
   The parent #modal-container has an after-swap handler that calls
   showModal() on any <dialog> it finds, so this opens automatically. #}
<dialog id="edit-modal"
        class="rounded-xl backdrop:bg-slate-900/60 dark:backdrop:bg-black/70 p-0 max-w-2xl w-full bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 shadow-2xl">
  <form hx-post="/transactions/{{ tr.id }}"
        hx-target="#modal-container"
        hx-swap="innerHTML"
        class="flex flex-col">
    <header class="px-6 py-4 border-b border-slate-200 dark:border-slate-700 flex items-start justify-between">
      <div>
        <h2 class="text-lg font-semibold">Edit transaction</h2>
        <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">
          {{ proj.name }} <span class="text-slate-400 dark:text-slate-500">— {{ proj.pps_element }}</span>
        </p>
      </div>
      <button type="button"
              onclick="this.closest('dialog').close(); document.getElementById('modal-container').innerHTML='';"
              class="p-1 rounded hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
              aria-label="Close">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </header>

    {% if error %}
      <div class="mx-6 mt-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300">
        {{ error }}
      </div>
    {% endif %}

    <div class="px-6 py-4 grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Posting date</label>
        <input type="date" name="posting_date" required value="{{ form.posting_date }}"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Amount</label>
        <input type="text" name="amount" required value="{{ form.amount }}"
               placeholder="e.g. 1.234,56"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 tabular-nums">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Document number</label>
        <input type="text" name="document_number" required value="{{ form.document_number }}"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 tabular-nums">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Account code</label>
        <input type="text" name="account_code" required value="{{ form.account_code }}"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 tabular-nums">
      </div>
      <div class="col-span-2">
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Account description</label>
        <input type="text" name="account_text" value="{{ form.account_text or '' }}"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Employee</label>
        <input type="text" name="employee" value="{{ form.employee or '' }}"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 tabular-nums">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Source</label>
        <input type="text" name="source" value="{{ form.source or '' }}"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div class="col-span-2">
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Text</label>
        <input type="text" name="text" value="{{ form.text or '' }}"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>
      <div>
        <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1">Year</label>
        <input type="number" name="year" value="{{ form.year or '' }}"
               class="w-full px-2 py-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 tabular-nums">
      </div>
    </div>

    <footer class="px-6 py-4 border-t border-slate-200 dark:border-slate-700 flex items-center justify-end gap-2">
      <button type="button"
              onclick="this.closest('dialog').close(); document.getElementById('modal-container').innerHTML='';"
              class="px-4 py-2 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors">
        Cancel
      </button>
      <button type="submit"
              class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
        Save
      </button>
    </footer>
  </form>
</dialog>
