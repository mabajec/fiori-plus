{# Conflict prompt swapped into #upload-result when the user uploads a
   file whose name already exists in their inputs folder. Replace finalizes
   the stashed upload; Cancel discards it. #}
<div class="mt-2 p-3 rounded-lg bg-amber-50 dark:bg-amber-900/30 border border-amber-200 dark:border-amber-800 text-sm text-amber-700 dark:text-amber-300 flex flex-wrap items-center gap-3">
  <div class="flex-1 min-w-0">
    A file named <span class="font-mono font-semibold">{{ filename }}</span> already exists. Replace it with the upload?
  </div>
  <div class="flex items-center gap-2">
    <button type="button"
            hx-delete="/imports/upload/{{ token }}"
            hx-target="#upload-result"
            hx-swap="innerHTML"
            class="px-3 py-1.5 text-xs font-medium rounded-md text-amber-700 dark:text-amber-300 hover:bg-amber-100 dark:hover:bg-amber-900/40 transition-colors">
      Cancel
    </button>
    <form hx-post="/imports/upload/{{ token }}/confirm"
          hx-target="#upload-result"
          hx-swap="innerHTML"
          class="m-0">
      <input type="hidden" name="filename" value="{{ filename }}">
      <button type="submit"
              class="px-3 py-1.5 text-xs font-medium rounded-md bg-amber-600 hover:bg-amber-700 text-white transition-colors">
        Replace
      </button>
    </form>
  </div>
</div>
